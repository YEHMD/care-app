<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住民查詢系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            background: #f5f5f5;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Login Page */
        #loginPage {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            flex-direction: column;
        }

        .login-box {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            min-width: 300px;
        }

        .login-emoji {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .login-box h1 {
            color: #22c55e;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .login-box input:focus {
            outline: none;
            border-color: #22c55e;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-box button:hover {
            transform: scale(1.02);
        }

        .login-box button:active {
            transform: scale(0.98);
        }

        /* ATM Numpad */
        .numpad-container {
            text-align: center;
        }

        .password-dots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .password-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e5e7eb;
            border: 2px solid #22c55e;
        }

        .password-dot.filled {
            background: #22c55e;
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 300px;
            margin: 0 auto;
        }

        .numpad-btn {
            width: 100%;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: #f3f4f6;
            color: #1f2937;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .numpad-btn:hover {
            background: #e5e7eb;
            transform: scale(1.05);
        }

        .numpad-btn:active {
            transform: scale(0.95);
        }

        .numpad-btn.func {
            background: #fecaca;
            color: #991b1b;
        }

        .numpad-btn.func:hover {
            background: #fca5a5;
        }

        /* Main App */
        #mainApp {
            display: none;
            flex: 1;
            overflow: hidden;
            height: 100vh;
            flex-direction: row;
        }

        #mainApp.show {
            display: flex;
        }

        /* Sidebar */
        #sidebar {
            width: 80px;
            background: #1e5a3b;
            color: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.3s;
        }

        #sidebar.expanded {
            width: 200px;
        }

        .sidebar-header {
            padding: 12px;
            text-align: center;
            background: #164a2f;
            border-bottom: 1px solid #0f3620;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hamburger {
            display: none;
            width: 100%;
            padding: 8px;
            background: #164a2f;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 20px;
        }

        #residentList {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .resident-item {
            padding: 12px 8px;
            border-bottom: 1px solid #0f3620;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .resident-item:hover {
            background: #0f3620;
        }

        .resident-item.active {
            background: #0a2817;
            font-weight: bold;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid #0f3620;
            text-align: center;
        }

        .sync-btn {
            width: 100%;
            padding: 8px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .sync-btn:hover {
            background: #16a34a;
        }

        /* Main Content */
        #mainContent {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background: white;
            border-bottom: 2px solid #e5e7eb;
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            min-height: 60px;
        }

        .tag {
            display: inline-block;
            background: #f0f9ff;
            color: #0369a1;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid #bae6fd;
            font-weight: 500;
        }

        .tag.name {
            background: #dcfce7;
            color: #166534;
            border-color: #86efac;
            font-size: 14px;
            font-weight: bold;
        }

        /* Content Container */
        .content-container {
            flex: 1;
            display: flex;
            gap: 0;
            overflow: hidden;
        }

        /* Drugs Section */
        #drugsSection {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid #e5e7eb;
        }

        .section-title {
            padding: 12px 16px;
            background: #f9fafb;
            font-weight: 600;
            color: #1f2937;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fullscreen-btn {
            cursor: pointer;
            font-size: 16px;
            color: #6b7280;
            background: none;
            border: none;
            padding: 0;
            margin-left: 12px;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .fullscreen-btn:hover {
            color: #22c55e;
        }

        .section-fullscreen {
            flex: 1 1 100%;
        }

        .section-hidden {
            display: none;
        }

        #drugsTable {
            flex: 1;
            overflow-x: auto;
            overflow-y: auto;
        }

        .drugs-table {
            border-collapse: collapse;
            font-size: 12px;
            white-space: nowrap;
        }

        .drugs-table thead {
            position: sticky;
            top: 0;
            background: #f3f4f6;
            z-index: 10;
        }

        .drugs-table th {
            padding: 4px 8px;
            text-align: left;
            font-weight: 600;
            color: #374151;
            border-bottom: 1px solid #d1d5db;
            white-space: nowrap;
            line-height: 1.2;
        }

        .drugs-table td {
            padding: 4px 6px;
            border-bottom: 1px solid #e5e7eb;
            white-space: nowrap;
            line-height: 1.2;
        }

        .drugs-table tr:hover {
            background: #f9fafb;
        }

        .freq-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            color: white;
        }

        .freq-QD {
            background: #3b82f6;
        }

        .freq-BID {
            background: #a855f7;
        }

        .freq-TID {
            background: #ec4899;
        }

        .freq-QID {
            background: #ef4444;
        }

        .freq-HS {
            background: #06b6d4;
        }

        .freq-PRN {
            background: #f97316;
        }

        .freq-QOD {
            background: #8b5cf6;
        }

        /* Labs Section */
        #labsSection {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chartContainer {
            display: none;
            padding: 12px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
            max-height: 250px;
            overflow-y: auto;
        }

        #chartContainer.show {
            display: block;
        }

        #labChart {
            max-height: 200px;
            cursor: pointer;
        }

        #labsTable {
            flex: 1;
            overflow-x: auto;
            overflow-y: auto;
        }

        .labs-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .labs-table thead {
            position: sticky;
            top: 0;
            background: #f3f4f6;
            z-index: 10;
        }

        .labs-table th {
            padding: 8px;
            text-align: center;
            font-weight: 600;
            color: #374151;
            border: 1px solid #d1d5db;
            white-space: nowrap;
            font-size: 11px;
        }

        .labs-table td {
            padding: 8px;
            text-align: center;
            border: 1px solid #e5e7eb;
            font-size: 11px;
        }

        .labs-table tbody tr:hover {
            background: #f9fafb;
        }

        .labs-table .item-name {
            text-align: left;
            font-weight: 500;
            background: #f9fafb;
            cursor: pointer;
        }

        .labs-table .item-name:hover {
            background: #f3f4f6;
        }

        .labs-table .item-name.active {
            background: #dcfce7;
            color: #166534;
        }

        .abnormal {
            color: #dc2626;
            font-weight: bold;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .hamburger {
                display: block;
            }

            #sidebar {
                position: absolute;
                height: 100%;
                z-index: 100;
                left: -80px;
                transition: left 0.3s;
            }

            #sidebar.open {
                left: 0;
            }

            .content-container {
                flex-direction: column;
            }

            #drugsSection {
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
            }

            #topbar {
                padding-left: 56px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .tag {
                font-size: 11px;
                padding: 4px 8px;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .hidden-file-input {
            display: none;
        }

        /* Mobile hamburger button - always visible on mobile */
        .mobile-hamburger {
            display: none;
            position: fixed;
            top: 8px;
            left: 8px;
            z-index: 200;
            width: 40px;
            height: 40px;
            background: #1e5a3b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* Sidebar overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 90;
        }

        .sidebar-overlay.show {
            display: block;
        }

        @media (max-width: 600px) {
            .mobile-hamburger {
                display: block;
            }

            #sidebar {
                width: 200px;
                left: -220px;
            }

            #sidebar.open {
                left: 0;
            }

            #drugsTable {
                -webkit-overflow-scrolling: touch;
            }

            #drugsTable table {
                min-width: 600px;
            }
        }

        .drug-info-title {
            font-size: 18px;
            font-weight: 700;
            color: #1e5a3b;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #22c55e;
        }
        .drug-info-section {
            margin-bottom: 10px;
            font-size: 13px;
            line-height: 1.5;
            color: #374151;
        }
        .drug-info-label {
            display: inline-block;
            background: #f0fdf4;
            color: #166534;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
            margin-right: 8px;
            margin-bottom: 4px;
        }
        .drug-clickable {
            cursor: pointer;
            color: #2563eb;
            text-decoration: underline;
            text-decoration-style: dotted;
        }
        .drug-clickable:hover {
            color: #1d4ed8;
        }

        </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage">
        <div class="login-box">
            <div class="login-emoji">🏥</div>
            <h1>住民查詢系統</h1>
            <div class="numpad-container">
                <div class="password-dots">
                    <div class="password-dot" id="dot0"></div>
                    <div class="password-dot" id="dot1"></div>
                    <div class="password-dot" id="dot2"></div>
                    <div class="password-dot" id="dot3"></div>
                </div>
                <div class="numpad">
                    <button class="numpad-btn" onclick="numpadPress(1)">1</button>
                    <button class="numpad-btn" onclick="numpadPress(2)">2</button>
                    <button class="numpad-btn" onclick="numpadPress(3)">3</button>
                    <button class="numpad-btn" onclick="numpadPress(4)">4</button>
                    <button class="numpad-btn" onclick="numpadPress(5)">5</button>
                    <button class="numpad-btn" onclick="numpadPress(6)">6</button>
                    <button class="numpad-btn" onclick="numpadPress(7)">7</button>
                    <button class="numpad-btn" onclick="numpadPress(8)">8</button>
                    <button class="numpad-btn" onclick="numpadPress(9)">9</button>
                    <button class="numpad-btn func" onclick="numpadClear()">C</button>
                    <button class="numpad-btn" onclick="numpadPress(0)">0</button>
                    <button class="numpad-btn func" onclick="numpadBackspace()">←</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp">
        <!-- Mobile hamburger button (always visible on mobile) -->
        <button class="mobile-hamburger" onclick="toggleSidebar()">☰</button>
        <!-- Sidebar overlay -->
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
        <!-- Sidebar -->
        <div id="sidebar">
            <button class="hamburger" onclick="toggleSidebar()">☰</button>
            <div class="sidebar-header">住民名單</div>
            <ul id="residentList"></ul>
            <div class="sidebar-footer">
                <button class="sync-btn" onclick="triggerFileUpload()">同步</button>
                <input type="file" id="fileInput" class="hidden-file-input" accept=".xlsx,.xls" />
            </div>
        </div>

        <!-- Main Content -->
        <div id="mainContent">
            <!-- Top Bar -->
            <div class="topbar" id="topbar"></div>

            <!-- Content Container -->
            <div class="content-container">
                <!-- Drugs Section -->
                <div id="drugsSection">
                    <div class="section-title">藥品<span class="fullscreen-btn" onclick="toggleFullscreen('drugs')">⤢</span></div>
                    <div id="drugsTable"></div>
                </div>

                <!-- Labs Section -->
                <div id="labsSection">
                    <div class="section-title">檢驗結果<span class="fullscreen-btn" onclick="toggleFullscreen('labs')">⤢</span></div>
                    <div id="chartContainer">
                        <canvas id="labChart"></canvas>
                    </div>
                    <div id="labsTable"></div>
                </div>
            </div>
        </div>
    </div>

j":"腎功能受損時應減量。","hepatic_adj":"肝功能受損者應減量；重度肝病患者應禁用。"},"nebivolol":{"generic":"Nebivolol","action":"β-受體阻滯劑，具有心臟選擇性和NO-介導血管舒張作用，降低血壓和心率。","adult_dose":"初始2.5毫克/日，根據效果調整至2.5-10毫克/日，最大劑量10毫克/日。","pedi_dose":"依醫師指示調整，一般不建議用於兒童。","side_effects":"疲勞，頭暈，頭痛，嗜睡，胃部不適","serious":"房室傳導阻滯，心源性休克，支氣管痙攣，心力衰竭惡化","contraindications":"對本藥過敏，心源性休克患者，未經控制的心力衰竭患者，第二或第三度房室傳導阻滯患者，支氣管哮喘患者","renal_adj":"肌酐清除率少於30 mL/分者應禁用。","hepatic_adj":"重度肝功能受損者應禁用。"},"esomeprazole":{"generic":"Esomeprazole","action":"質子泵抑制劑，通過抑制胃壁細胞H+/K+三磷酸腺苷酶，減少胃酸分泌，用於胃酸相關疾病。","adult_dose":"每日20-40毫克，一次服用，療程4-8週，可根據需要延長。","pedi_dose":"1個月至18歲兒童按體重給藥，0.5-1毫克/公斤，每日一次。","side_effects":"頭痛，腹瀉，噁心，腹部痛，便秘","serious":"低血鎂，維生素B12缺乏，免疫複合體性腎炎，肝臟功能異常","contraindications":"對本藥過敏，妊娠期婦女（除非必要）","renal_adj":"腎功能受損時無需調整。","hepatic_adj":"重度肝功能受損者應不超過20毫克/日。"},"insulin_aspart_biphasic":{"generic":"Insulin Aspart Biphasic","action":"胰島素類似物，由速效和中效胰島素組成，用於1型及2型糖尿病患者的血糖控制。","adult_dose":"劑量因人而異，通常每日10-50單位，分早晚餐前給藥，需根據血糖監測結果調整。","pedi_dose":"依醫師指示調整，根據兒童體重和血糖水準個體化給藥。","side_effects":"低血糖，注射部位反應，體重增加，皮膚肥厚","serious":"重度低血糖，低血鉀，過敏反應","contraindications":"對本藥過敏，低血糖患者","renal_adj":"腎功能受損時應減量並密切監測血糖。","hepatic_adj":"肝功能受損時應減量並密切監測血糖。"},"insulin_aspart":{"generic":"Insulin Aspart","action":"快速作用胰島素類似物，經由皮下注射迅速吸收，降低餐後血糖，用於糖尿病治療。","adult_dose":"劑量因人而異，通常每日5-20單位，餐前立即注射，需根據血糖監測結果調整。","pedi_dose":"依醫師指示調整，根據兒童體重和血糖水準個體化給藥。","side_effects":"低血糖，注射部位反應，體重增加，皮膚肥厚","serious":"重度低血糖，低血鉀，過敏反應","contraindications":"對本藥過敏，低血糖患者","renal_adj":"腎功能受損時應減量並密切監測血糖。","hepatic_adj":"肝功能受損時應減量並密切監測血糖。"},"olmesartan":{"generic":"Olmesartan","action":"血管緊張素II受體拮抗劑，阻斷AT1受體，使血管舒張，降低血壓。","adult_dose":"初始20毫克/日，根據效果調整至20-40毫克/日，最大劑量40毫克/日。","pedi_dose":"依醫師指示調整，一般6歲以上兒童初始10毫克/日。","side_effects":"頭暈，頭痛，疲勞，腹瀉，關節痛","serious":"低血壓，腎功能惡化，高血鉀，過敏反應","contraindications":"對本藥過敏，妊娠期婦女，雙側腎動脈狹窄患者","renal_adj":"腎功能輕度至中度受損時無需調整。","hepatic_adj":"肝功能受損時無需特殊調整。"},"omeprazole":{"generic":"Omeprazole","action":"質子泵抑制劑，通過抑制胃壁細胞H+/K+三磷酸腺苷酶，減少胃酸分泌，用於胃酸相關疾病。","adult_dose":"每日20-40毫克，一次服用，療程4-8週，可根據需要 atic_adj":"肝功能受損者應謹慎使用。"},"propranolol":{"generic":"Propranolol","action":"非選擇性β-受體阻滯劑，通過抑制β-受體，降低心率和血壓，減少心肌耗氧量。","adult_dose":"高血壓初始40毫克，每日2-3次，根據效果調整至160-240毫克/日；心絞痛10-20毫克，每日3-4次。","pedi_dose":"依醫師指示調整，一般按體重1-2毫克/公斤給藥。","side_effects":"疲勞，頭暈，嗜睡，頭痛，胃部不適","serious":"房室傳導阻滯，心源性休克，支氣管痙攣，心力衰竭惡化","contraindications":"對本藥過敏，心源性休克患者，未經控制的心力衰竭患者，第二或第三度房室傳導阻滯患者，支氣管哮喘患者","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損者應減量。"},"quetiapine":{"generic":"Quetiapine","action":"非典型抗精神病藥，通過阻斷多巴胺和血清素受體，用於精神分裂症和雙極障礙的治療。","adult_dose":"精神分裂症初始50毫克，每日2次，根據效果逐漸增加至300-400毫克/日，分2-3次給藥。","pedi_dose":"依醫師指示調整，用於青少年時需謹慎監測。","side_effects":"嗜睡，頭暈，體重增加，口乾，便秘","serious":"代謝症候群，QT間期延長，心律不整，惡性症候群，高血糖","contraindications":"對本藥過敏，QT間期延長患者，未經控制的癲癇患者","renal_adj":"腎功能受損時應減量。","hepatic_adj":"肝功能受損者應減量；重度肝病患者禁用。"},"fluticasone_vilanterol":{"generic":"Fluticasone/Vilanterol","action":"吸入粉劑複方，包含吸入性類固醇和長效β2受體激動劑，用於慢性阻塞性肺病的維持治療。","adult_dose":"每日吸入一次，每次100/25微克或200/25微克。","pedi_dose":"依醫師指示調整，一般不用於兒童。","side_effects":"咳嗽，喉嚨刺激，頭痛，肌肉痠痛，聲音嘶啞","serious":"骨質疏鬆症，腎上腺皮質功能不全，心律不整，支氣管痙攣惡化","contraindications":"對本藥過敏，急性哮喘發作患者，主要症狀為哮喘患者不適合作為維持治療","renal_adj":"無需特殊調整。","hepatic_adj":"無需特殊調整。"},"risperidone":{"generic":"Risperidone","action":"非典型抗精神病藥，通過阻斷多巴胺和血清素受體，用於精神分裂症和躁狂症的治療。","adult_dose":"初始2毫克/日，根據效果調整至4-16毫克/日，分早晚兩次給藥或每日一次。","pedi_dose":"依醫師指示調整，13-17歲青少年初始0.5毫克/日，根據效果調整至3-6毫克/日。","side_effects":"頭暈，嗜睡，頭痛，體重增加，胃部不適","serious":"代謝症候群，QT間期延長，心律不整，惡性症候群，高血糖","contraindications":"對本藥過敏，未經控制的癲癇患者","renal_adj":"腎功能受損時應減量。","hepatic_adj":"肝功能受損者應減量；重度肝病患者禁用。"},"rivastigmine":{"generic":"Rivastigmine","action":"膽鹼酯酶抑制劑，增加大腦中乙醯膽鹼的濃度，改善認知功能，用於輕中度阿茲海默症。","adult_dose":"初始1.5毫克/日，每2週增加1.5毫克，維持劑量3-6毫克/日，分早晚兩次給藥。","pedi_dose":"依醫師指示調整，一般不用於兒童。","side_effects":"噁心，嘔吐，腹瀉，頭暈，頭痛","serious":"心動過緩，房室傳導阻滯，胃潰瘍，暈厥","contraindications":"對本藥過敏，尚未診斷之胃潰瘍患者","renal_adj":"輕度至中度腎功能受損時無需調整；重度受損者應減量。","hepatic_adj":"中度肝功能受損者應減量；重度肝病患者禁用。"},"clonazepam":{"generic":"Clonazepam","action":"苯二氮卓類藥物，通過增強GABA受體的神經遞質作用，產生抗驚厥、抗焦慮和肌肉鬆弛效果。","adult_dose":"抗驚厥初始0.5毫克，每日3次，根據效果調整至1-4毫克/日，分3次給藥。","pedi_dose":"依醫師指示調整，初始按體重0.01-0.03毫克/公斤，分次給藥。","side_effects":"嗜睡，頭暈，協調不良，頭痛，虛弱","serious":"呼吸抑制，成癮性，依賴性，過敏反應，喉部水腫","contraindications":"對本藥過敏，重症肌無力患者，急性閉角型青光眼患者，妊娠期婦女","renal_adj":"腎功能受損時應減量。","hepatic_adj":"肝功能受損者應減量；重度肝病患者禁用。"},"rosuvastatin":{"generic":"Rosuvastatin","action":"他汀類藥物，通過抑制HMG-CoA還原酶，降低血液中的膽固醇和低密度脂蛋白，預防心血管疾病。","adult_dose":"初始5-10毫克/日，根據效果調整至5-40毫克/日，最大劑量40毫克/日，通常在晚間服用。","pedi_dose":"8-17歲兒童初始5-10毫克/日，根據效果調整，最大40毫克/日。","side_effects":"肌肉痠痛，頭痛，便秘，肝酶升高","serious":"橫紋肌溶解症，肌炎，肝臟功能異常，血糖升高","contraindications":"對本藥過敏，活動性肝臟疾病或肝酶持續升高，妊娠期和哺乳期婦女","renal_adj":"腎功能受損時應減量；肌酐清除率少於30 mL/分者最大劑量5毫克/日。","hepatic_adj":"肝功能受損者應減量；重度肝病患者禁用。"},"insulin_degludec_aspart":{"generic":"Insulin Degludec/Aspart","action":"胰島素類似物，由長效和速效胰島素組成，用於1型及2型糖尿病患者的血糖控制。","adult_dose":"劑量因人而異，通常每日10-50單位，分早晚餐前給藥，需根據血糖監測結果調整。","pedi_dose":"依醫師指示調整，根據兒童體重和血糖水準個體化給藥。","side_effects":"低血糖，注射部位反應，體重增加，皮膚肥厚","serious":"重度低血糖，低血鉀，過敏反應","contraindications":"對本藥過敏，低血糖患者","renal_adj":"腎功能受損時應減量並密切監測血糖。","hepatic_adj":"肝功能受損時應減量並密切監測血糖。"},"sennoside":{"generic":"Sennoside","action":"植物性瀉藥，通過刺激結腸肌肉收縮和增加腸內容物液體含量，促進排便，用於便秘治療。","adult_dose":"每次12.5-25毫克，每晚服用，或根據需要調整。","pedi_dose":"依醫師指示調整，6歲以上兒童可按體重調整劑量。","side_effects":"腹部痙攣，腹瀉，噁心，皮疹","serious":"電解質失衡，脫水，腸道穿孔，結腸黑便症（長期使用）","contraindications":"對本藥過敏，腹部急症患者，腸梗阻患者，妊娠期婦女","renal_adj":"腎功能受損時應避免長期使用。","hepatic_adj":"肝功能受損時應避免長期使用。"},"sertraline":{"generic":"Sertraline","action":"選擇性血清素再攝取抑制劑，通過增加突觸間隙中血清素的濃度，用於治療抑鬱症、焦慮症和強迫症。","adult_dose":"初始50毫克/日，根據效果調整至50-200毫克/日，最大劑量200毫克/日。","pedi_dose":"6-12歲兒童初始25毫克/日，根據效果調整至25-50毫克/日；13-17歲青少年同成人。","side_effects":"噁心，頭暈，性功能障礙，失眠，激動","serious":"血清素症候群，精神病症狀，出血傾向，自殺思想","contraindications":"對本藥過敏，同時使用單胺氧化酶抑制劑患者","renal_adj":"腎功能受損時無需調整。","hepatic_adj":"肝功能受損者應減量或延長給藥間隔。"},"silodosin":{"generic":"Silodosin","action":"α1A-腎上腺素受體選擇性拮抗劑，使前列腺和膀胱頸肌肉鬆弛，改善排尿症狀，用於良性前列腺增生。","adult_dose":"每次4毫克，每日1次，建議與食物同服。","pedi_dose":"依醫師指示調整，一般不用於兒童。","side_effects":"頭暈，頭痛，疲勞，逆行射精，噁心","serious":"低血壓，暈厥，性功能障礙，過敏反應","contraindications":"對本藥過敏，嚴重肝功能受損患者，同時使用強效CYP3A4抑制劑患者","renal_adj":"肌酐清除率少於30 mL/分者應禁用。","hepatic_adj":"重度肝功能受損者應禁用。"},"silymarin":{"generic":"Silymarin","action":"植物性肝臟保護劑，通過抗氧化和抗炎作用，保護肝細胞膜，促進肝細胞再生，用於肝臟疾病治療。","adult_dose":"每次140-210毫克，每日2-3次，或根據產品強度調整。","pedi_dose":"依醫師指示調整，一般按體重4-7毫克/公斤給藥。","side_effects":"腹瀉，噁心，腹部不適，皮疹","serious":"過敏反應，肝臟功能異常（罕見）","contraindications":"對本藥過敏","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時仍可使用，但應監測肝功能。"},"dimethicone":{"generic":"Dimethicone","action":"消泡劑，通過降低腸道氣泡的表面張力，使氣泡聚集排出，用於腹脹和腹部不適。","adult_dose":"每次40-125毫克，每日3-4次，或根據需要調整。","pedi_dose":"依醫師指示調整，一般按體重2-5毫克/公斤給藥。","side_effects":"罕見，偶有便秘或腹瀉","serious":"罕見，過敏反應（罕見）","contraindications":"對本藥過敏","renal_adj":"腎功能受損時無需調整。","hepatic_adj":"肝功能受損時無需調整。"},"sodium_bicarbonate":{"generic":"Sodium Bicarbonate","action":"抗酸藥，通過中和胃酸，迅速緩解胃灼熱和酸性消化不良症狀。","adult_dose":"每次0.3-1克，每4小時一次，或根據需要調整，每日最大7克。","pedi_dose":"依醫師指示調整，一般按體重0.5-1毫克/公斤給藥。","side_effects":"脹氣，噁心，打嗝，便秘","serious":"代謝性鹼中毒，低鈣血症，電解質失衡，腎臟損害","contraindications":"對本藥過敏，腸梗阻患者，妊娠期婦女（長期使用）","renal_adj":"腎功能受損時應避免或減少使用。","hepatic_adj":"肝功能受損時無需特殊調整。"},"chlorzoxazone":{"generic":"Chlorzoxazone","action":"中樞肌肉鬆弛劑，作用於脊髓和上位中樞，減少肌肉張力，用於肌肉痙攣和頸椎病。","adult_dose":"每次250毫克，每日3-4次，或每次500毫克，每日2-3次。","pedi_dose":"依醫師指示調整，一般按體重20毫克/公斤給藥。","side_effects":"嗜睡，頭暈，噁心，腹瀉，皮疹","serious":"肝臟毒性，過敏反應，血球減少症","contraindications":"對本藥過敏，急性卟啉症患者，妊娠期婦女","renal_adj":"腎功能受損時應減量或延長給藥間隔。","hepatic_adj":"肝功能受損者應減量；重度肝病患者禁用。"},"spironolactone":{"generic":"Spironolactone","action":"醛固酮受體拮抗劑，通過阻斷醛固酮作用，減少鈉和水的重吸收，增加鉀的保留，用於高血壓和心力衰竭。","adult_dose":"高血壓初始25毫克/日，根據效果調整至25-100毫克/日，最大劑量200毫克/日。","pedi_dose":"依醫師指示調整，一般按體重1-3毫克/公斤給藥。","side_effects":"頭暈，頭痛，疲勞，胃部不適，高血鉀症","serious":"高血鉀症，腎功能惡化，低血鈉症，性功能障礙","contraindications":"對本藥過敏，血鉀升高患者，腎功能嚴重受損患者，妊娠期婦女","renal_adj":"肌酐清除率少於30 mL/分者應禁用。","hepatic_adj":"肝硬化患者應謹慎使用並密切監測。"},"zolpidem":{"generic":"Zolpidem","action":"非苯二氮卓類催眠藥，通過激活GABA受體，誘導睡眠，用於短期失眠治療。","adult_dose":"每次5-10毫克，睡前服用，起始劑量5毫克。","pedi_dose":"依醫師指示調整，一般不建議用於兒童。","side_effects":"頭暈，頭痛，嗜睡，協調不良，疲勞","serious":"複雜睡眠行為，依賴性，呼吸抑制，過敏反應","contraindications":"對本藥過敏，妊娠期婦女，嚴重肝功能受損患者","renal_adj":"腎功能受損時應減量。","hepatic_adj":"肝功能受損者應減量；重度肝病患者禁用或不超過5毫克。"},"sulpiride":{"generic":"Sulpiride","action":"非典型抗精神病藥，通過阻斷多巴胺受體，用於精神分裂症和抑鬱症伴焦慮的治療。","adult_dose":"精神分裂症每日800-1200毫克，分3次給藥；抑鬱症每日50-100毫克，分1-2次給藥。","pedi_dose":"依醫師指示調整，一般不建議用於兒童。","side_effects":"嗜睡，頭暈，頭痛，胃部不適，體重增加","serious":"惡性症候群，QT間期延長，心律不整，高血糖","contraindications":"對本藥過敏，嫌色細胞瘤患者，未經控制的癲癇患者","renal_adj":"腎功能受損時應減量。","hepatic_adj":"肝功能受損者應減量。"},"lansoprazole":{"generic":"Lansoprazole","action":"質子泵抑制劑，通過抑制胃壁細胞H+/K+三磷酸腺苷酶，減少胃酸分泌，用於胃酸相關疾病。","adult_dose":"每日15-30毫克，一次服用，療程4-8週，可根據需要延長。","pedi_dose":"1-11歲兒童按體重給藥，1毫克/公斤，最大30毫克/日。","side_effects":"頭痛，腹瀉，噁心，腹部痛，便秘","serious":"低血鎂，維生素B12缺乏，肝臟功能異常，急性間質性腎炎","contraindications":"對本藥過敏，妊娠期婦女（除非必要）","renal_adj":"腎功能受損時無需調整。","hepatic_adj":"重度肝功能受損者應減量至每日15毫克。"},"tamsulosin":{"generic":"Tamsulosin","action":"α1-腎上腺素受體拮抗劑，使前列腺和膀胱頸肌肉鬆弛，改善排尿症狀，用於良性前列腺增生。","adult_dose":"每次0.4毫克，每日1次，建議早上同時服用。","pedi_dose":"依醫師指示調整，一般不用於兒童。","side_effects":"頭暈，頭痛，疲勞，逆行射精，噁心","serious":"低血壓，暈厥，性功能障礙，過敏反應","contraindications":"對本藥過敏，嚴重肝功能受損患者","renal_adj":"腎功能受損時無需調整。","hepatic_adj":"重度肝功能受損者應禁用。"},"tizanidine":{"generic":"Tizanidine","action":"中樞α2-腎上腺素受體激動劑，減少脊髓神經遞質的釋放，減少肌肉張力，用於肌肉痙攣。","adult_dose":"初始2-4毫克，每6-8小時一次，根據效果調整至4-8毫克，每日3次，最大36毫克/日。","pedi_dose":"依醫師指示調整，一般不建議用於兒童。","side_effects":"嗜睡，頭暈，口乾，頭痛，疲勞","serious":"低血壓，心動過緩，肝臟毒性，幻覺","contraindications":"對本藥過敏，肝功能嚴重受損患者","renal_adj":"腎功能受損時應減量或延長給藥間隔。","hepatic_adj":"肝功能受損者應減量或避免使用；重度肝病患者禁用。"},"insulin_glargine":{"generic":"Insulin Glargine","action":"長效胰島素類似物，經由皮下注射緩慢吸收，提供24小時的胰島素補充，用於糖尿病治療。","adult_dose":"劑量因人而異，通常每日10-50單位，晚間注射，需根據血糖監測結果調整。","pedi_dose":"依醫師指示調整，根據兒童體重和血糖水準個體化給藥。","side_effects":"低血糖，注射部位反應，體重增加，皮膚肥厚","serious":"重度低血糖，低血鉀，過敏反應","contraindications":"對本藥過敏，低血糖患者","renal_adj":"腎功能受損時應減量並密切監測血糖。","hepatic_adj":"肝功能受損時應減量並密切監測血糖。"},"linagliptin":{"generic":"Linagliptin","action":"二肽基肽酶4抑制劑，延長胰高血糖素樣肽1和葡萄糖依賴性促胰島素分泌肽的作用，促進胰島素分泌，用於2型糖尿病。","adult_dose":"每日5毫克，一次服用，可與食物同服。","pedi_dose":"依醫師指示調整，一般不建議用於兒童。","side_effects":"頭痛，鼻喉症狀，關節痛，腹瀉","serious":"胰腺炎，過敏反應，Stevens-Johnson症候群，血球減少症","contraindications":"對本藥過敏，1型糖尿病患者，糖尿病酮症酸中毒患者","renal_adj":"腎功能受損時無需調整。","hepatic_adj":"肝功能受損時應謹慎使用。"},"tramadol":{"generic":"Tramadol","action":"中樞性止痛藥，通過抑制去甲腎上腺素和血清素再攝取，以及激動μ-鴉片受體，用於中度疼痛治療。","adult_dose":"每次50-100毫克，每4-6小時一次，或緩釋劑型100-200毫克，每日1-2次，最大400毫克/日。","pedi_dose":"12歲以上兒童同成人；12歲以下依醫師指示調整。","side_effects":"頭暈，嗜睡，噁心，便秘，疲勞","serious":"血清素症候群，癲癇發作，依賴性，呼吸抑制，過敏反應","contraindications":"對本藥過敏，同時使用單胺氧化酶抑制劑患者，嚴重肝臟或腎臟疾病患者","renal_adj":"肌酐清除率少於30 mL/分者應禁用。","hepatic_adj":"肝功能受損者應減量；重度肝病患者禁用。"},"tranexamic_acid":{"generic":"Tranexamic Acid","action":"止血藥，通過抑制纖維蛋白溶解，促進凝血，用於出血和月經過多治療。","adult_dose":"每次250-500毫克，每日2-3次，或靜脈注射每次250毫克，每日2-3次。","pedi_dose":"依醫師指示調整，一般按體重10-15毫克/公斤給藥。","side_effects":"頭暈，頭痛，消化不適，噁心，皮疹","serious":"血栓栓塞，視覺異常，肌肉痛，血球減少症","contraindications":"對本藥過敏，活動性血栓栓塞患者，色素性視網膜炎患者","renal_adj":"腎功能受損時應減量。","hepatic_adj":"肝功能受損時無需特殊調整。"},"amitriptyline":{"generic":"Amitriptyline","action":"三環類抗抑鬱藥，通過抑制去甲腎上腺素和血清素再攝取，用於重度抑鬱症和神經痛治療。","adult_dose":"初始25毫克，每晚服用，根據效果調整至75-150毫克/日，最大300毫克/日。","pedi_dose":"依醫師指示調整，用於青少年時需謹慎監測。","side_effects":"嗜睡，口乾，便秘，頭暈，體重增加","serious":"心律不整，心肌梗死，精神病症狀惡化，血球減少症","contraindications":"對本藥過敏，最近心肌梗死患者，嚴重心律不整患者，妊娠期婦女","renal_adj":"腎功能受損時應減量。","hepatic_adj":"肝功能受損者應減量；重度肝病患者禁用。"},"telmisartan_amlodipine":{"generic":"Telmisartan/Amlodipine","action":"血管緊張素II受體拮抗劑與鈣通道阻滯劑複方，通過兩種機制降低血壓，用於高血壓治療。","adult_dose":"每日1片，含telmisartan 40-80毫克及amlodipine 5-10毫克。","pedi_dose":"依醫師指示調整，一般不建議用於兒童。","side_effects":"頭暈，頭痛，疲勞，周圍水腫，背痛","serious":"低血壓，腎功能惡化，高血鉀，心肌梗死惡化","contraindications":"對本藥過敏，妊娠期婦女，雙側腎動脈狹窄患者","renal_adj":"腎功能輕度至中度受損時無需調整。","hepatic_adj":"肝功能受損時應減量。"},"valproic_acid":{"generic":"Valproic Acid","action":"抗驚厥藥，通過增加GABA濃度和抑制鈉通道，用於癲癇和躁狂症治療。","adult_dose":"癲癇初始每日600-800毫克，分次給藥，根據血藥濃度調整至1000-2000毫克/日，最大3000毫克/日。","pedi_dose":"依醫師指示調整，一般按體重10-15毫克/公斤給藥。","side_effects":"頭暈，嗜睡，震顫，體重增加，脫髮","serious":"肝臟毒性，胰腺炎，血球減少症，致畸性","contraindications":"對本藥過敏，肝臟疾病患者，未診斷之代謝疾病患者，妊娠期婦女","renal_adj":"腎功能受損時無需特殊調整，但應監測。","hepatic_adj":"肝功能受損者應禁用；輕度受損者應謹慎監測。"},"valsartan":{"generic":"Valsartan","action":"血管緊張素II受體拮抗劑，阻斷AT1受體，使血管舒張，降低血壓，用於高血壓和心力衰竭治療。","adult_dose":"高血壓初始80毫克/日，根據效果調整至80-320毫克/日；心力衰竭起始40毫克，逐漸增加至160毫克。","pedi_dose":"6-16歲兒童按體重給藥，1.3毫克/公斤，最大160毫克/日。","side_effects":"頭暈，頭痛，疲勞，背痛，關節痛","serious":"低血壓，腎功能惡化，高血鉀，過敏反應","contraindications":"對本藥過敏，妊娠期婦女，雙側腎動脈狹窄患者","renal_adj":"腎功能輕度至中度受損時無需調整。","hepatic_adj":"肝功能受損時應減量。"},"pyridoxine":{"generic":"Vitamin B6","action":"維生素B6，參與胺基酸代謝、神經遞質合成和血紅素形成，用於B6缺乏症治療。","adult_dose":"每日1.3-1.7毫克，或根據缺乏情況調整至10-100毫克/日。","pedi_dose":"依醫師指示調整，一般按年齡和體重給藥。","side_effects":"罕見，高劑量可引起神經病變、皮疹","serious":"周圍神經病變（高劑量長期使用），過敏反應","contraindications":"對本藥過敏","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時無需特殊調整。"},"warfarin":{"generic":"Warfarin","action":"香豆素類抗凝血藥，通過抑制維生素K依賴的凝血因子合成，預防和治療血栓栓塞。","adult_dose":"初始劑量5-10毫克，然後根據國際標準化比值調整維持劑量，通常2-10毫克/日。","pedi_dose":"依醫師指示調整，用於兒童時需要密切監測國際標準化比值。","side_effects":"出血，皮疹，噁心，腹瀉，脫髮","serious":"嚴重出血，肝臟毒性，組織壞死，過敏反應","contraindications":"對本藥過敏，活動性出血患者，嚴重肝臟或腎臟疾病患者，妊娠期婦女","renal_adj":"腎功能受損時應謹慎使用並密切監測。","hepatic_adj":"肝功能受損者應減量；重度肝病患者禁用。"},"zopiclone":{"generic":"Zopiclone","action":"非苯二氮卓類催眠藥，通過激活GABA受體，誘導睡眠，用於短期失眠治療。","adult_dose":"每次3.75-7.5毫克，睡前服用，起始劑量3.75毫克。","pedi_dose":"依醫師指示調整，一般不建議用於兒童。","side_effects":"頭暈，頭痛，嗜睡，協調不良，疲勞，口感異常","serious":"複雜睡眠行為，依賴性，呼吸抑制，過敏反應","contraindications":"對本藥過敏，妊娠期婦女，嚴重肝功能受損患者","renal_adj":"腎功能受損時應減量。","hepatic_adj":"肝功能受損者應減量；重度肝病患者禁用。"},"baclofen":{"generic":"Baclofen","action":"GABA受體激動劑，用於緩解肌肉痙攣和僵硬。通過抑制脊髓中的神經傳遞來降低肌張力。","adult_dose":"起始劑量5毫克，每日3次，逐漸增加至15-20毫克每日3次，最大劑量80毫克/天。","pedi_dose":"依醫師指示調整，通常按體重0.3-0.5毫克/公斤/天，分次給藥。","side_effects":"嗜睡，頭暈，疲勞，頭痛，胃部不適","serious":"呼吸抑制，心律不整，幻覺，癲癇發作，過敏反應","contraindications":"對本藥過敏，中風患者應謹慎使用，肌肉無力症","renal_adj":"腎功能受損時應減量，肌酐清除率<15毫升/分時應特別注意。","hepatic_adj":"肝功能受損時可正常使用，無需特殊調整。"},"benzbromarone":{"generic":"Benzbromarone","action":"高效能尿酸排泄促進劑，通過抑制腎小管對尿酸的重吸收來降低血尿酸濃度。","adult_dose":"每日25-50毫克，分1-2次服用，療程數週至數月。","pedi_dose":"依醫師指示調整，一般不推薦用於兒童。","side_effects":"皮疹，瘙癢，噁心，腹瀉，肝酶升高","serious":"肝炎，肝細胞損傷，過敏反應，骨髓抑制","contraindications":"對本藥過敏，肝功能嚴重受損，活動性肝病，痛風發作期間不宜開始治療","renal_adj":"腎功能受損時應謹慎使用，可能需要減量。","hepatic_adj":"肝功能受損時禁用或應謹慎使用，應定期監測肝功能。"},"betahistine":{"generic":"Betahistine","action":"組胺H1受體激動劑，改善內耳血流，用於治療美尼爾病引起的眩暈、耳鳴和聽力喪失。","adult_dose":"每次8-16毫克，每日3次，療程4-12週。","pedi_dose":"依醫師指示調整，12歲以上可使用成人劑量。","side_effects":"頭痛，噁心，胃部不適，皮疹，瘙癢","serious":"過敏反應，哮喘惡化，消化性潰瘍出血","contraindications":"對本藥過敏，嗜鉻細胞瘤患者，活動性消化性潰瘍","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時無需特殊調整。"},"bethanechol":{"generic":"Bethanechol","action":"膽鹼受體激動劑，直接作用於副交感神經，增強膀胱和腸道肌肉的收縮力。","adult_dose":"口服每次25毫克，每日3次；皮下注射5毫克，每日1-2次。","pedi_dose":"依醫師指示調整，通常按體重0.3毫克/公斤給藥。","side_effects":"噁心，嘔吐，腹瀉，腹痛，流涎增多，頻尿","serious":"支氣管痙攣，哮喘發作，心律不整，血壓升高，腸穿孔","contraindications":"對本藥過敏，膀胱出口梗阻，腸梗阻，哮喘，肺病患者","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時無需特殊調整。"},"mirabegron":{"generic":"Mirabegron","action":"β3腎上腺素受體激動劑，用於治療過動膀胱，通過增加膀胱儲尿期間的肌肉鬆弛來改善症狀。","adult_dose":"起始劑量25毫克每日1次，根據耐受性可增至50毫克每日1次。","pedi_dose":"依醫師指示調整，一般不推薦用於兒童。","side_effects":"頭痛，口乾，高血壓，頭暈，便秘，噁心","serious":"血壓明顯升高，心律不整，過敏反應，尿潴留","contraindications":"對本藥過敏，未控制的高血壓，終末期腎病","renal_adj":"肌酐清除率<30毫升/分時應限制劑量為25毫克/天。","hepatic_adj":"重度肝功能受損時應限制劑量為25毫克/天。"},"calcium_supplement":{"generic":"Calcium Supplement","action":"補充鈣質，用於治療和預防骨質疏鬆症、低血鈣症和其他鈣缺乏相關疾病。","adult_dose":"每日1000-1500毫克鈣，分2-3次服用。","pedi_dose":"兒童每日需鈣量800-1200毫克，根據年齡調整。","side_effects":"便秘，脹氣，腹部不適，噁心，胃灼熱","serious":"高血鈣症，腎結石，乳鹼綜合症，噁心嘔吐，便秘加重","contraindications":"對本藥過敏，高血鈣症，肉芽腫病，骨轉移瘤患者","renal_adj":"重度腎功能受損時應謹慎使用，需監測血鈣濃度。","hepatic_adj":"肝功能受損時無需特殊調整。"},"biperiden":{"generic":"Biperiden","action":"抗膽鹼藥物，用於治療帕金森病的震顫和僵硬，也用於治療抗精神病藥引起的運動障礙。","adult_dose":"每日1-2毫克，分2次服用，可根據需要增至6毫克/天。","pedi_dose":"依醫師指示調整，一般按體重0.04毫克/公斤給藥。","side_effects":"口乾，視力模糊，頭暈，嗜睡，便秘，尿滯留","serious":"青光眼、泌尿道阻塞惡化，精神症狀加重，心律不整","contraindications":"對本藥過敏，閉角型青光眼，前列腺肥大伴尿滯留，腸梗阻","renal_adj":"腎功能受損時應謹慎使用，可能需要減量。","hepatic_adj":"肝功能受損時應謹慎使用，可能需要減量。"},"bisacodyl":{"generic":"Bisacodyl","action":"刺激性瀉藥，通過刺激結腸肌肉收縮促進排便，用於治療便秘和腸道準備。","adult_dose":"口服5-15毫克每日1次；直腸栓劑10毫克每日1次。","pedi_dose":"6歲以上兒童口服5毫克，或直腸栓劑5毫克每日1次。","side_effects":"腹痛，腹瀉，噁心，肛門灼痛，肌肉痙攣","serious":"嚴重腹瀉導致脫水和電解質紊亂，腸穿孔，低鉀血症","contraindications":"對本藥過敏，腸梗阻，急性腹痛，痔瘡伴出血，炎症性腸病急性期","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時無需特殊調整。"},"brotizolam":{"generic":"Brotizolam","action":"短效苯二氮卓類藥物，通過增強GABA受體活性產生催眠、鎮靜效果，用於失眠治療。","adult_dose":"每日0.25-0.5毫克，睡前30分鐘服用。","pedi_dose":"依醫師指示調整，一般不推薦用於兒童。","side_effects":"晨間嗜睡，頭暈，頭痛，肌肉無力，依賴性","serious":"呼吸抑制，深度嗜睡，記憶喪失，成癮，停藥綜合症","contraindications":"對本藥過敏，重度睡眠呼吸暫停，肝功能嚴重受損，物質濫用史","renal_adj":"腎功能受損時應謹慎使用，可能需要減量。","hepatic_adj":"肝功能受損時禁用或應謹慎使用並減量。"},"bromhexine":{"generic":"Bromhexine","action":"黏液溶解劑，通過分解痰液中的黏蛋白使痰液變稀，易於咳出，用於呼吸道疾病。","adult_dose":"每次8-16毫克，每日3次。","pedi_dose":"6-12歲兒童每次4-8毫克，每日3次。","side_effects":"噁心，嘔吐，腹瀉，皮疹，頭暈","serious":"過敏反應，支氣管痙攣，肝功能異常","contraindications":"對本藥過敏，消化性潰瘍患者，孕婦","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時應謹慎使用，可能需要減量。"},"carvedilol":{"generic":"Carvedilol","action":"綜合α和β受體阻斷劑，用於治療高血壓、心力衰竭和冠心病，具有血管擴張和抗氧化特性。","adult_dose":"高血壓：起始6.25毫克每日1次，可增至12.5-25毫克每日1次。心力衰竭：起始3.125毫克每日1次。","pedi_dose":"依醫師指示調整，一般按體重0.1-0.5毫克/公斤給藥。","side_effects":"頭暈，疲勞，頭痛，腹瀉，便秘，低血糖","serious":"心動過緩，心傳導障礙，低血壓，心力衰竭加重，哮喘惡化","contraindications":"對本藥過敏，嚴重心動過緩，心傳導障礙，除控制良好的糖尿病外禁用於未控制糖尿病患者","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時應謹慎使用，可能需要減量。"},"celecoxib":{"generic":"Celecoxib","action":"環氧化酶-2選擇性抑制劑，用於治療疼痛和炎症，特別是關節炎，減少對胃腸道的損害。","adult_dose":"每日200-400毫克，分1-2次服用，最大劑量400毫克/天。","pedi_dose":"依醫師指示調整，一般適用於10歲以上兒童。","side_effects":"腹痛，腹瀉，便秘，噁心，頭痛，頭暈","serious":"胃腸道出血和潰瘍，心血管事件，肝功能異常，腎功能受損，過敏反應","contraindications":"對本藥或磺胺類藥過敏，活動性消化性潰瘍，嚴重心血管疾病，重度肝腎功能受損","renal_adj":"肌酐清除率<25毫升/分時應減半劑量。","hepatic_adj":"中重度肝功能受損時應減量或禁用。"},"chlorpheniramine":{"generic":"Chlorpheniramine","action":"第一代選擇性H1受體拮抗劑，用於治療過敏症狀，具有中樞鎮靜作用。","adult_dose":"每次4毫克，每日3-4次，或緩釋製劑每日8-12毫克。","pedi_dose":"6歲以上兒童每次2毫克，每日3次；6歲以下按醫師指示調整。","side_effects":"嗜睡，口乾，頭暈，視力模糊，頭痛，便秘","serious":"呼吸抑制，過敏反應，心律不整，癲癇發作","contraindications":"對本藥過敏，新生兒和早產兒，睡眠呼吸暫停，閉角型青光眼","renal_adj":"腎功能受損時應謹慎使用，可能需要減量。","hepatic_adj":"肝功能受損時應謹慎使用，可能需要減量。"},"cilostazol":{"generic":"Cilostazol","action":"血小板聚集抑制劑和血管擴張劑，用於改善跛行患者的行走距離，預防血栓形成。","adult_dose":"每次50-100毫克，每日2次，療程8-12週以上。","pedi_dose":"依醫師指示調整，一般不推薦用於兒童。","side_effects":"頭痛，頭暈，腹瀉，心悸，失眠，噁心","serious":"心律不整，血栓栓塞，出血，心肌梗死","contraindications":"對本藥過敏，充血性心力衰竭，活動性出血，最近心肌梗死患者","renal_adj":"重度腎功能受損時應謹慎使用。","hepatic_adj":"肝功能受損時應謹慎使用。"},"ciprofloxacin":{"generic":"Ciprofloxacin","action":"第二代喹諾酮類抗生素，通過抑制細菌DNA旋轉酶發揮廣譜抗菌作用，用於多種細菌感染。","adult_dose":"口服每次250-750毫克，每日2次；靜脈輸注200-400毫克，每日2次。","pedi_dose":"一般不推薦用於兒童，但對於嚴重感染可按醫師指示給藥。","side_effects":"噁心，腹瀉，腹痛，頭暈，頭痛，皮疹，光敏反應","serious":"肌腱炎和肌腱斷裂，關節軟骨損傷，中樞神經系統毒性，過敏反應，結腸炎","contraindications":"對本藥過敏，肌腱炎或肌腱斷裂史，癲癇或中樞神經系統疾病，重症肌無力","renal_adj":"肌酐清除率50毫升/分以上無需調整；25-49毫升/分時減量；<25毫升/分時劑量減半。","hepatic_adj":"肝功能受損時無需特殊調整。"},"cortisone":{"generic":"Cortisone","action":"糖皮質激素，通過抑制免疫反應和炎症反應，用於治療多種炎症和自身免疫疾病。","adult_dose":"每日25-300毫克，分次服用，根據疾病類型和嚴重程度調整。","pedi_dose":"依醫師指示調整，一般按體重0.5-2毫克/公斤給藥。","side_effects":"食慾增加，睡眠障礙，情緒改變，胃部不適，頭暈，易激惹","serious":"骨質疏鬆症，免疫抑制，感染增加，高血糖，高血壓，肌肉無力，精神病症","contraindications":"對本藥過敏，全身性真菌感染，活動性結核病，疫苗接種期間","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時應謹慎使用。"},"dextromethorphan":{"generic":"Dextromethorphan","action":"中樞性止咳藥，作用於咳嗽中樞，不具有成癮性，用於治療乾咳。","adult_dose":"每次10-20毫克，每日3-4次，或緩釋製劑每次30毫克，每日1-2次。","pedi_dose":"6歲以上兒童每次5-10毫克，每日3-4次。","side_effects":"頭暈，嗜睡，胃部不適，便秘，噁心","serious":"呼吸抑制，過敏反應，血清素綜合症（與其他血清素能藥物合用時）","contraindications":"對本藥過敏，服用單胺氧化酶抑制劑，未控制的哮喘，慢性肺病患者","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時應謹慎使用，可能需要減量。"},"diazepam":{"generic":"Diazepam","action":"長效苯二氮卓類藥物，通過增強GABA受體活性產生抗焦慮、鎮靜、肌肉鬆弛和抗癲癇效果。","adult_dose":"焦慮：每日2-10毫克，分2-4次服用。肌肉痙攣：每日2-10毫克。癲癇：每次5-10毫克，每日1-4次。","pedi_dose":"依醫師指示調整，6個月以上嬰兒可使用較小劑量。","side_effects":"嗜睡，頭暈，頭痛，疲勞，肌肉無力，依賴性","serious":"呼吸抑制，深度昏迷，記憶喪失，成癮，停藥綜合症","contraindications":"對本藥過敏，重度呼吸衰竭，睡眠呼吸暫停，肝功能嚴重受損，物質濫用史","renal_adj":"腎功能受損時應謹慎使用，可能需要減量。","hepatic_adj":"肝功能受損時禁用或應謹慎使用並減量。"},"diphenidol":{"generic":"Diphenidol","action":"抗暈動藥，通過作用於前庭系統和化學觸發區抑制噁心嘔吐反射。","adult_dose":"每次25-50毫克，每日3-4次，最大劑量300毫克/天。","pedi_dose":"依醫師指示調整，體重超過30公斤的兒童可使用成人劑量。","side_effects":"頭暈，嗜睡，口乾，視力模糊，頭痛，輕微的胃部不適","serious":"幻覺，精神症狀，心律不整，過敏反應","contraindications":"對本藥過敏，腸梗阻，膽汁梗阻，閉角型青光眼，孕婦","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時應謹慎使用。"},"domperidone":{"generic":"Domperidone","action":"多巴胺受體拮抗劑，通過增強胃腸動力改善胃排空，用於治療噁心、嘔吐和腹脹。","adult_dose":"每次10毫克，每日3次，或每次20毫克，每日2次。","pedi_dose":"按體重0.25毫克/公斤，每日3次，最大劑量80毫克/天。","side_effects":"頭痛，口乾，腹痛，腹瀉，皮疹，疲勞","serious":"心律不整，QT延長，心臟驟停，過敏反應","contraindications":"對本藥過敏，胃腸道出血，機械性腸梗阻，泌乳素分泌瘤，QT延長綜合症","renal_adj":"腎功能受損時應謹慎使用，可能需要減量。","hepatic_adj":"肝功能受損時應謹慎使用，可能需要減量。"},"donepezil":{"generic":"Donepezil","action":"乙醯膽鹼酯酶抑制劑，通過增加乙醯膽鹼濃度改善認知功能，用於阿茲海默症治療。","adult_dose":"起始5毫克每晚服用，4-6週後增至10毫克每晚服用。","pedi_dose":"依醫師指示調整，一般不用於兒童。","side_effects":"噁心，嘔吐，腹瀉，腹痛，肌肉痙攣，頭痛，失眠","serious":"心動過緩，心傳導障礙，十二指腸潰瘍，消化道出血，過敏反應","contraindications":"對本藥過敏，心動過緩，西Adams-Stokes綜合症，病態竇房結綜合症，消化性潰瘍患者","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時應謹慎使用，可能需要減量。"},"doxazosin":{"generic":"Doxazosin","action":"α1受體阻斷劑，用於治療高血壓和良性前列腺增生，通過阻斷α1受體促進血管擴張和尿道鬆弛。","adult_dose":"起始1毫克每日1次，根據血壓反應逐漸增至2-16毫克每日1次。","pedi_dose":"依醫師指示調整，一般不推薦用於兒童。","side_effects":"頭暈，疲勞，頭痛，水腫，疲勞，低血壓症狀","serious":"嚴重低血壓，心律不整，心肌梗死，肌肉無力","contraindications":"對本藥過敏","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時應謹慎使用。"},"duloxetine":{"generic":"Duloxetine","action":"血清素-去甲腎上腺素再攝取抑制劑，用於治療抑鬱症、焦慮症和慢性疼痛。","adult_dose":"起始30-60毫克每日1次，根據反應可增至60-120毫克每日。","pedi_dose":"依醫師指示調整，一般不推薦用於18歲以下青少年。","side_effects":"噁心，頭暈，嗜睡，口乾，便秘，失眠，頭痛","serious":"血清素綜合症，停藥綜合症，肝毒性，出血，低鈉血症，癲癇發作","contraindications":"對本藥過敏，服用單胺氧化酶抑制劑，肝功能嚴重受損，不受控制的青光眼","renal_adj":"終末期腎病（肌酐清除率<30毫升/分）時禁用。","hepatic_adj":"肝功能受損時應謹慎使用或禁用。"},"estazolam":{"generic":"Estazolam","action":"短-中效苯二氮卓類催眠藥，用於治療失眠，通過增強GABA受體活性產生催眠效果。","adult_dose":"每日0.5-2毫克，睡前30分鐘服用。","pedi_dose":"依醫師指示調整，一般不推薦用於兒童。","side_effects":"晨間嗜睡，頭暈，頭痛，肌肉無力，依賴性，記憶障礙","serious":"呼吸抑制，深度嗜睡，成癮，停藥綜合症","contraindications":"對本藥過敏，重度睡眠呼吸暫停，肝功能嚴重受損，物質濫用史","renal_adj":"腎功能受損時應謹慎使用，可能需要減量。","hepatic_adj":"肝功能受損時禁用或應謹慎使用並減量。"},"ezetimibe_atorvastatin":{"generic":"Ezetimibe/Atorvastatin","action":"膽固醇吸收抑制劑結合他汀類藥物，通過多重機制降低膽固醇，用於高脂血症治療。","adult_dose":"每日10/10毫克至10/80毫克，可根據反應調整。","pedi_dose":"依醫師指示調整，一般適用於10歲以上兒童。","side_effects":"肌肉痛，頭痛，消化不適，疲勞，皮疹","serious":"橫紋肌溶解症，肝毒性，肝功能異常，肌肉炎症，過敏反應","contraindications":"對本藥過敏，活動性肝病，肌動蛋白升高超過3倍正常值，孕婦和哺乳期婦女","renal_adj":"腎功能輕-中度受損時無需調整；嚴重受損時應謹慎使用。","hepatic_adj":"肝功能受損時禁用或應謹慎使用。"},"ezetimibe_rosuvastatin":{"generic":"Ezetimibe/Rosuvastatin","action":"膽固醇吸收抑制劑結合他汀類藥物，強效降低膽固醇，用於高脂血症治療。","adult_dose":"每日10/5毫克至10/40毫克，可根據反應調整。","pedi_dose":"依醫師指示調整，一般適用於8歲以上兒童。","side_effects":"肌肉痛，頭痛，消化不適，疲勞，皮疹","serious":"橫紋肌溶解症，肝毒性，肝功能異常，肌肉炎症，過敏反應","contraindications":"對本藥過敏，活動性肝病，肌酸激酶升高超過3倍正常值，孕婦和哺乳期婦女","renal_adj":"腎功能輕度受損時無需調整；嚴重受損時應謹慎使用。","hepatic_adj":"肝功能受損時禁用或應謹慎使用。"},"famotidine":{"generic":"Famotidine","action":"H2受體拮抗劑，通過抑制組胺誘導的胃酸分泌，用於治療胃食道反流病和消化性潰瘍。","adult_dose":"每次20毫克，每日2次；或每晚40毫克。","pedi_dose":"1歲以上兒童按體重0.5毫克/公斤，每日2次，最大劑量40毫克/天。","side_effects":"頭痛，頭暈，便秘，腹瀉，肌肉痛，疲勞","serious":"肝功能異常，血液系統異常，過敏反應，間質性腎炎","contraindications":"對本藥過敏","renal_adj":"肌酐清除率<30毫升/分時應延長給藥間隔至48小時。","hepatic_adj":"肝功能受損時應謹慎使用。"},"febuxostat":{"generic":"Febuxostat","action":"黃嘌呤氧化酶抑制劑，比別嘌呤更有效地降低血尿酸，用於痛風和高尿酸血症治療。","adult_dose":"起始40毫克每日1次，8週後若血尿酸未達標，增至80毫克每日1次。","pedi_dose":"依醫師指示調整，一般不推薦用於兒童。","side_effects":"頭痛，噁心，腹瀉，肝酶升高，皮疹，瘙癢","serious":"肝炎，肝細胞損傷，心血管事件，痛風發作加重，過敏反應","contraindications":"對本藥過敏，急性痛風發作期間應使用非類固醇抗炎藥保護，HLA-B5801陽性患者","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時應謹慎使用，需監測肝功能。"},"felodipine":{"generic":"Felodipine","action":"鈣通道阻斷劑，用於治療高血壓和冠心病，通過血管擴張降低血壓和改善冠狀動脈血流。","adult_dose":"起始2.5毫克每日1次，根據血壓反應增至5-10毫克每日1次。","pedi_dose":"依醫師指示調整，一般不推薦用於兒童。","side_effects":"頭痛，臉部潮紅，頭暈，腿部水腫，心悸，疲勞","serious":"嚴重低血壓，心肌梗死，心律不整，過敏反應","contraindications":"對本藥過敏，嚴重低血壓","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時應謹慎使用，可能需要減量。"},"fluoxetine":{"generic":"Fluoxetine","action":"選擇性血清素再攝取抑制劑，用於治療抑鬱症、焦慮症、強迫症和進食障礙。","adult_dose":"起始20毫克每日1次，根據反應增至40-80毫克每日。","pedi_dose":"8歲以上兒童起始10毫克每日1次，可增至20毫克每日。","side_effects":"噁心，頭痛，失眠，焦慮，性功能障礙，體重增加或減少","serious":"血清素綜合症，停藥綜合症，自殺傾向，低鈉血症，出血，癲癇發作","contraindications":"對本藥過敏，服用單胺氧化酶抑制劑，未治療的狹角型青光眼","renal_adj":"腎功能受損時應謹慎使用，可能需要減量。","hepatic_adj":"肝功能受損時應謹慎使用或減量。"},"folic_acid":{"generic":"Folic Acid","action":"維生素B9，參與核酸合成，用於治療葉酸缺乏症和預防神經管缺陷。","adult_dose":"治療缺乏症：每日1-5毫克。預防神經管缺陷：每日400-800微克。","pedi_dose":"兒童每日按體重5-10微克/公斤給藥，或每日50-400微克。","side_effects":"罕見，大劑量可能導致皮疹，瘙癢，噁心","serious":"過敏反應，維生素B12吸收干擾","contraindications":"未治療的維生素B12缺乏症患者不應單獨使用葉酸","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時無需特殊調整。"},"furosemide":{"generic":"Furosemide","action":"襻利尿劑，通過抑制亨利氏環升部對鈉、鉀、氯的重吸收，用於治療液體瀦留和高血壓。","adult_dose":"口服每次20-80毫克，每日1-2次；靜脈注射20-40毫克，必要時重複給予。","pedi_dose":"新生兒初始0.5-1毫克/公斤，每日1-2次；嬰幼兒1-2毫克/公斤。","side_effects":"頭暈，虛弱，疲勞，肌肉痙攣，電解質紊亂，聽力喪失","serious":"嚴重脫水和低血壓，嚴重電解質紊亂（低鉀血症、低鈉血症），急性腎功能衰竭，聽覺毒性","contraindications":"對本藥過敏，嚴重脫水，無尿症，電解質嚴重失衡","renal_adj":"腎功能嚴重受損時應增加劑量；肌酐清除率<10毫升/分時可能需要更大劑量。","hepatic_adj":"肝功能受損時應謹慎使用，可能需要調整劑量。"},"ginkgo_biloba":{"generic":"Ginkgo Biloba","action":"銀杏葉提取物，改善血流和氧合，用於改善認知功能和周邊血流障礙。","adult_dose":"每日120毫克，分2-3次服用，療程4-12週或更長。","pedi_dose":"依醫師指示調整，一般不推薦用於兒童。","side_effects":"頭暈，頭痛，胃部不適，皮疹，瘙癢，出血傾向","serious":"出血風險增加，頭部創傷出血，過敏反應","contraindications":"對本藥過敏，出血性疾病或正在使用抗凝血劑，即將進行手術患者","renal_adj":"腎功能受損時無需特殊調整。","hepatic_adj":"肝功能受損時無需特殊調整。"},"glimepiride_metformin":{"generic":"Glimepiride/Metformin","action":"磺脲類藥物結合二甲雙胍，通過促進胰島素分泌和改善胰島素敏感性來降低血糖。","adult_dose":"根據血糖控制情況調整，起始劑量通常為1/500毫克或2/500毫克，每日1-2次。","pedi_dose":"依醫師指示調整，一般不推薦用於兒童。","side_effects":"低血糖，頭暈，頭痛，乏力，腹瀉，噁心，肌肉痛","serious":"低血糖症，乳酸酸中毒，肝功能異常，過敏反應","contraindications":"對本藥過敏，第1型糖尿病，活動性肝病，腎功能嚴重受損，糖尿病酮症酸中毒","renal_adj":"肌酐清除率<30毫升/分時禁用；30-45毫升/分時應謹慎使用。","hepatic_adj":"肝功能受損時禁用。"},"imatinib"         function lookupDrug(drugText) {
            // Extract base drug name from the full drug text (e.g., "Atorvastatin 10mg 1# QD" -> "atorvastatin")
            var clean = drugText.split(/[,，]/)[0].trim();
            var match = clean.match(/^([A-Za-z][A-Za-z\s\-\+\/\.]+?)(?:\s+\d|$)/);
            var baseName = match ? match[1].trim().replace(/\.$/, '') : clean.split(/\s/)[0];
            var key = baseName.toLowerCase().replace(/\s+/g, '_');
            
            // Direct match in DB
            if (DRUG_DB[key]) return DRUG_DB[key];
            
            // Try brand map
            // Try full key first, then progressively shorter
            for (var k in BRAND_MAP) {
                if (key.indexOf(k) === 0 || k.indexOf(key) === 0) {
                    if (DRUG_DB[BRAND_MAP[k]]) return DRUG_DB[BRAND_MAP[k]];
                }
            }
            
            // Try partial match in brand map
            var firstWord = baseName.toLowerCase().split(/[\s\-]/)[0];
            if (BRAND_MAP[firstWord] && DRUG_DB[BRAND_MAP[firstWord]]) {
                return DRUG_DB[BRAND_MAP[firstWord]];
            }
            
            // Try partial match in DB keys
            for (var dbKey in DRUG_DB) {
                if (dbKey.indexOf(firstWord) >= 0 || firstWord.indexOf(dbKey) >= 0) {
                    return DRUG_DB[dbKey];
                }
            }
            
            return null;
        }

        function showDrugInfo(drugText) {
            var info = lookupDrug(drugText);
            var modal = document.getElementById('drugModal');
            var content = document.getElementById('drugModalContent');
            
            if (!info) {
                content.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">查無「' + drugText.split(/\s/)[0] + '」的藥品資料</div>';
            } else {
                content.innerHTML = 
                    '<div class="drug-info-title">' + info.generic + '</div>' +
                    '<div class="drug-info-section"><span class="drug-info-label">藥理作用</span>' + info.action + '</div>' +
                    '<div class="drug-info-section"><span class="drug-info-label">成人用量</span>' + info.adult_dose + '</div>' +
                    '<div class="drug-info-section"><span class="drug-info-label">小兒用量</span>' + info.pedi_dose + '</div>' +
                    '<div class="drug-info-section"><span class="drug-info-label">常見副作用</span>' + info.side_effects + '</div>' +

        function adjustSectionSizes() {
            const container = document.querySelector('.content-container');
            const drugsSection = document.getElementById('drugsSection');
            const labsSection = document.getElementById('labsSection');
            if (!container || !drugsSection || !labsSection) return;

            // Reset to auto to measure natural height
            drugsSection.style.flex = 'none';
            labsSection.style.flex = 'none';
            drugsSection.style.overflow = 'visible';
            labsSection.style.overflow = 'visible';

            const totalH = container.clientHeight;
            const halfH = totalH / 2;
            const drugsNatural = drugsSection.scrollHeight;
            const labsNatural = labsSection.scrollHeight;

            let drugsFlex, labsFlex;

            if (drugsNatural <= halfH && labsNatural <= halfH) {
                // Both fit in half — give each their natural size
                drugsFlex = `0 0 auto`;
                labsFlex = `0 0 auto`;
            } else if (drugsNatural <= halfH) {
                // Drugs small, labs gets the rest
                drugsFlex = `0 0 ${drugsNatural}px`;
                labsFlex = `1 1 0`;
            } else if (labsNatural <= halfH) {
                // Labs small, drugs gets the rest
                drugsFlex = `1 1 0`;
                labsFlex = `0 0 ${labsNatural}px`;
            } else {
                // Both big — split 50/50
                drugsFlex = `1 1 50%`;
                labsFlex = `1 1 50%`;
            }

            drugsSection.style.flex = drugsFlex;
            labsSection.style.flex = labsFlex;
            drugsSection.style.overflow = 'hidden';
            labsSection.style.overflow = 'hidden';
        }

        function toggleFullscreen(section) {

            const labsSection = document.getElementById('labsSection');
            const drugsBtn = drugsSection.querySelector('.fullscreen-btn');

            const isCurrentlyFullscreen = section === 'drugs' ? drugsSection.classList.contains('section-fullscreen') : labsSection.classList.contains('section-fullscreen');

            if (isCurrentlyFullscreen) {
                // Exit fullscreen - restore both sections
                drugsSection.classList.remove('section-fullscreen', 'section-hidden');
                labsSection.classList.remove('section-fullscreen', 'section-hidden');
                drugsBtn.textContent = '⤢';
                labsBtn.textContent = '⤢';
                adjustSectionSizes();
            } else {

                    drugsSection.classList.add('section-hidden');

                    labsBtn.textContent = '⤡';

            }

            let html = '<table class="drugs-table"><thead><tr><th>醫院</th><th>科別</th><th>藥品</th><th>劑量</th><th>數量</th><th>用法</th><th>起</th><th>迄</th></tr></thead><tbody>';
            
            drugs.forEach(drug => {
                const freqClass = `freq-${drug.freq}`;
                html += `<tr>
                    <td>${drug.hospital}</td>
                    <td>${drug.dept}</td>
                    <td class="drug-clickable" onclick="showDrugInfo(\`${drug.drug}\`)">${drug.drug}</td>
                    <td>${drug.dose}</td>
                    <td>${drug.qty}</td>
                    <td><span class="freq-badge ${freqClass}">${drug.freq}</span></td>
                    <td>${drug.start}</td>
                    <td>${drug.end}</td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function updateLabsTable() {
            const container = document.getElementById('labsTable');
            const labs = currentResident.labs || [];

            if (labs.length === 0) {
                container.innerHTML = '<div style="padding: 16px; text-align: center; color: #999;">無檢驗結果</div>';
                return;
            }

            // Collect all unique dates and items
            const dateSet = new Set();
            const itemsMap = new Map();

            labs.forEach(labResult => {
                dateSet.add(labResult.date);
                (labResult.items || []).forEach(item => {
                    if (!itemsMap.has(item.name)) {
                        itemsMap.set(item.name, {});
                    }
                    itemsMap.get(item.name)[labResult.date] = item;
                });
            });

            const dates = Array.from(dateSet).sort().reverse();
            const items = Array.from(itemsMap.keys());

            // Build pivot table
            let html = '<table class="labs-table"><thead><tr><th>檢驗項目</th><th style="font-size: 10px; color: #9ca3af; white-space: nowrap;">參考值</th>';
            dates.forEach(date => {
                html += `<th>${date}</th>`;
            });
            html += '</tr></thead><tbody>';

            items.forEach(itemName => {
                const isActive = selectedLabItem === itemName;
                const range = LAB_RANGES[itemName] || '-';
                html += `<tr><td class="item-name ${isActive ? 'active' : ''}" onclick="selectLabItem('${itemName.replace(/'/g, "\\'")}')">${itemName}</td><td style="font-size: 10px; color: #9ca3af; white-space: nowrap;">${range}</td>`;
                dates.forEach(date => {
                    const item = itemsMap.get(itemName)[date];
                    if (item) {
                        const valueClass = item.abnormal ? 'abnormal' : '';
                        html += `<td class="${valueClass}">${item.value}</td>`;
                    } else {
                        html += '<td>-</td>';
                    }
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function selectLabItem(itemName) {
            selectedLabItem = itemName;
            updateLabsTable();
            drawChart(itemName);
        }

        function drawChart(itemName) {
            const labs = currentResident.labs || [];
            const dataPoints = [];

            labs.forEach(labResult => {
                const item = labResult.items.find(i => i.name === itemName);
                if (item) {
                    let value = parseFloat(item.value);
                    if (isNaN(value)) {
                        value = null;
                    }
                    dataPoints.push({
                        date: labResult.date,
                        value: value,
                        abnormal: item.abnormal
                    });
                }
            });

            dataPoints.sort((a, b) => a.date.localeCompare(b.date));

            const chartContainer = document.getElementById('chartContainer');
            chartContainer.classList.add('show');

            const ctx = document.getElementById('labChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }

            const borderColors = dataPoints.map(p => p.abnormal ? '#dc2626' : '#22c55e');
            const pointColors = dataPoints.map(p => p.abnormal ? '#dc2626' : '#3b82f6');

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dataPoints.map(p => p.date),
                    datasets: [{
                        label: itemName,
                        data: dataPoints.map(p => p.value),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        pointRadius: 5,
                        pointBackgroundColor: pointColors,
                        pointBorderColor: borderColors,
                        pointBorderWidth: 2,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: true
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false
                        }
                    }
                }
            });
        }

        document.getElementById('chartContainer').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('chartContainer').classList.remove('show');
            selectedLabItem = null;
            updateLabsTable();
            if (chartInstance) {
                chartInstance.destroy();
                chartInstance = null;
            }
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        function closeSidebarOnMobile() {
            if (window.innerWidth < 600) {
                document.getElementById('sidebar').classList.remove('open');
                document.querySelector('.sidebar-overlay').classList.remove('show');
            }
        }

        function triggerFileUpload() {
            document.getElementById('fileInput').click();
        }

        // File upload handler (placeholder)
        var fileInputEl = document.getElementById('fileInput');
        if (fileInputEl) {
            fileInputEl.addEventListener('change', function(e) {
                alert('檔案上傳功能待實裝');
            });
        }
    </script>
    <!-- Drug Info Modal -->
    <div id="drugModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;justify-content:center;align-items:center;padding:16px;" onclick="closeDrugModal()">
        <div style="background:white;border-radius:12px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;padding:20px;position:relative;" onclick="event.stopPropagation()">
            <button onclick="closeDrugModal()" style="position:absolute;top:10px;right:14px;background:none;border:none;font-size:22px;cursor:pointer;color:#999;">✕</button>
            <div id="drugModalContent"></div>
        </div>
    </div>

</body>
