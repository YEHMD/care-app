<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住民查詢系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            background: #f5f5f5;
        }

        /* Login Page */
        #loginPage {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            flex-direction: column;
        }

        .login-box {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            min-width: 300px;
        }

        .login-emoji {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .login-box h1 {
            color: #22c55e;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .login-box input:focus {
            outline: none;
            border-color: #22c55e;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-box button:hover {
            transform: scale(1.02);
        }

        .login-box button:active {
            transform: scale(0.98);
        }

        /* Main App */
        #mainApp {
            display: none;
            flex: 1;
            overflow: hidden;
            height: 100vh;
            flex-direction: row;
        }

        #mainApp.show {
            display: flex;
        }

        /* Sidebar */
        #sidebar {
            width: 80px;
            background: #1e5a3b;
            color: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.3s;
        }

        #sidebar.expanded {
            width: 200px;
        }

        .sidebar-header {
            padding: 12px;
            text-align: center;
            background: #164a2f;
            border-bottom: 1px solid #0f3620;
            font-weight: bold;
            font-size: 12px;
            white-space: nowrap;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hamburger {
            display: none;
            width: 100%;
            padding: 8px;
            background: #164a2f;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 20px;
        }

        #residentList {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .resident-item {
            padding: 12px 8px;
            border-bottom: 1px solid #0f3620;
            cursor: pointer;
            transition: background-color 0.2s;
            text-align: center;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .resident-item:hover {
            background: #0f3620;
        }

        .resident-item.active {
            background: #0a2817;
            font-weight: bold;
        }

        .sidebar-footer {
            padding: 12px;
            border-top: 1px solid #0f3620;
            text-align: center;
        }

        .sync-btn {
            width: 100%;
            padding: 8px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .sync-btn:hover {
            background: #16a34a;
        }

        /* Main Content */
        #mainContent {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background: white;
            border-bottom: 2px solid #e5e7eb;
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            min-height: 60px;
        }

        .tag {
            display: inline-block;
            background: #f0f9ff;
            color: #0369a1;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid #bae6fd;
            font-weight: 500;
        }

        .tag.name {
            background: #dcfce7;
            color: #166534;
            border-color: #86efac;
            font-size: 14px;
            font-weight: bold;
        }

        /* Content Container */
        .content-container {
            flex: 1;
            display: flex;
            gap: 0;
            overflow: hidden;
        }

        /* Drugs Section */
        #drugsSection {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid #e5e7eb;
        }

        .section-title {
            padding: 12px 16px;
            background: #f9fafb;
            font-weight: 600;
            color: #1f2937;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
        }

        #drugsTable {
            flex: 1;
            overflow-x: auto;
            overflow-y: auto;
        }

        .drugs-table {
            border-collapse: collapse;
            font-size: 12px;
            white-space: nowrap;
        }

        .drugs-table thead {
            position: sticky;
            top: 0;
            background: #f3f4f6;
            z-index: 10;
        }

        .drugs-table th {
            padding: 4px 8px;
            text-align: left;
            font-weight: 600;
            color: #374151;
            border-bottom: 1px solid #d1d5db;
            white-space: nowrap;
            line-height: 1.2;
        }

        .drugs-table td {
            padding: 4px 6px;
            border-bottom: 1px solid #e5e7eb;
            white-space: nowrap;
            line-height: 1.2;
        }

        .drugs-table tr:hover {
            background: #f9fafb;
        }

        .freq-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            color: white;
        }

        .freq-QD {
            background: #3b82f6;
        }

        .freq-BID {
            background: #a855f7;
        }

        .freq-TID {
            background: #ec4899;
        }

        .freq-QID {
            background: #ef4444;
        }

        .freq-HS {
            background: #06b6d4;
        }

        .freq-PRN {
            background: #f97316;
        }

        .freq-QOD {
            background: #8b5cf6;
        }

        /* Labs Section */
        #labsSection {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #chartContainer {
            display: none;
            padding: 12px;
            background: white;
            border-bottom: 1px solid #e5e7eb;
            max-height: 250px;
            overflow-y: auto;
        }

        #chartContainer.show {
            display: block;
        }

        #labChart {
            max-height: 200px;
            cursor: pointer;
        }

        #labsTable {
            flex: 1;
            overflow-x: auto;
            overflow-y: auto;
        }

        .labs-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .labs-table thead {
            position: sticky;
            top: 0;
            background: #f3f4f6;
            z-index: 10;
        }

        .labs-table th {
            padding: 8px;
            text-align: center;
            font-weight: 600;
            color: #374151;
            border: 1px solid #d1d5db;
            white-space: nowrap;
            font-size: 11px;
        }

        .labs-table td {
            padding: 8px;
            text-align: center;
            border: 1px solid #e5e7eb;
            font-size: 11px;
        }

        .labs-table tbody tr:hover {
            background: #f9fafb;
        }

        .labs-table .item-name {
            text-align: left;
            font-weight: 500;
            background: #f9fafb;
            cursor: pointer;
        }

        .labs-table .item-name:hover {
            background: #f3f4f6;
        }

        .labs-table .item-name.active {
            background: #dcfce7;
            color: #166534;
        }

        .abnormal {
            color: #dc2626;
            font-weight: bold;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .hamburger {
                display: block;
            }

            #sidebar {
                position: absolute;
                height: 100%;
                z-index: 100;
                left: -80px;
                transition: left 0.3s;
            }

            #sidebar.open {
                left: 0;
            }

            .content-container {
                flex-direction: column;
            }

            #drugsSection {
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .tag {
                font-size: 11px;
                padding: 4px 8px;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .hidden-file-input {
            display: none;
        }

        /* Mobile hamburger button - always visible on mobile */
        .mobile-hamburger {
            display: none;
            position: fixed;
            top: 8px;
            left: 8px;
            z-index: 200;
            width: 40px;
            height: 40px;
            background: #1e5a3b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* Sidebar overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 90;
        }

        .sidebar-overlay.show {
            display: block;
        }

        @media (max-width: 600px) {
            .mobile-hamburger {
                display: block;
            }

            #sidebar {
                width: 200px;
                left: -220px;
            }

            #sidebar.open {
                left: 0;
            }

            #drugsTable {
                -webkit-overflow-scrolling: touch;
            }

            #drugsTable table {
                min-width: 600px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage">
        <div class="login-box">
            <div class="login-emoji">🏥</div>
            <h1>住民查詢系統</h1>
            <input type="password" id="passwordInput" placeholder="請輸入密碼" />
            <button onclick="handleLogin()">登入</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp">
        <!-- Mobile hamburger button (always visible on mobile) -->
        <button class="mobile-hamburger" onclick="toggleSidebar()">☰</button>
        <!-- Sidebar overlay -->
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
        <!-- Sidebar -->
        <div id="sidebar">
            <button class="hamburger" onclick="toggleSidebar()">☰</button>
            <div class="sidebar-header">住民名單</div>
            <ul id="residentList"></ul>
            <div class="sidebar-footer">
                <button class="sync-btn" onclick="triggerFileUpload()">同步</button>
                <input type="file" id="fileInput" class="hidden-file-input" accept=".xlsx,.xls" />
            </div>
        </div>

        <!-- Main Content -->
        <div id="mainContent">
            <!-- Top Bar -->
            <div class="topbar" id="topbar"></div>

            <!-- Content Container -->
            <div class="content-container">
                <!-- Drugs Section -->
                <div id="drugsSection">
                    <div class="section-title">藥品</div>
                    <div id="drugsTable"></div>
                </div>

                <!-- Labs Section -->
                <div id="labsSection">
                    <div class="section-title">檢驗結果</div>
                    <div id="chartContainer">
                        <canvas id="labChart"></canvas>
                    </div>
                    <div id="labsTable"></div>
                </div>
            </div>
        </div>
    </div>

        let currentResident = null;
        let chartInstance = null;
        let selectedLabItem = null;

        function handleLogin() {
            const password = document.getElementById('passwordInput').value;
            if (password === '5888') {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainApp').classList.add('show');
                initializeApp();
            } else {
                alert('密碼錯誤');
                document.getElementById('passwordInput').value = '';
            }
        }

        function initializeApp() {
            renderResidentList();
            if (RESIDENTS_DATA.length > 0) {
                selectResident(0);
            }
        }

        function renderResidentList() {
            const list = document.getElementById('residentList');
            list.innerHTML = '';
            RESIDENTS_DATA.forEach((resident, index) => {
                const li = document.createElement('li');
                li.className = 'resident-item';
                li.textContent = resident.name;
                li.onclick = () => selectResident(index);
                list.appendChild(li);
            });
        }

        function selectResident(index) {
            currentResident = RESIDENTS_DATA[index];
            
            // Update sidebar selection
            document.querySelectorAll('.resident-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });

            // Close sidebar on mobile
            closeSidebarOnMobile();

            // Update top bar
            updateTopBar();

            // Update drugs table
            updateDrugsTable();

            // Update labs table
            updateLabsTable();

            // Close chart if open
            document.getElementById('chartContainer').classList.remove('show');
            selectedLabItem = null;

            // Adjust section sizes
            adjustSectionSizes();
        }

        function adjustSectionSizes() {
            const container = document.querySelector('.content-container');
            const drugsSection = document.getElementById('drugsSection');
            const labsSection = document.getElementById('labsSection');
            if (!container || !drugsSection || !labsSection) return;

            // Reset to auto to measure natural height
            drugsSection.style.flex = 'none';
            labsSection.style.flex = 'none';
            drugsSection.style.overflow = 'visible';
            labsSection.style.overflow = 'visible';

            const totalH = container.clientHeight;
            const halfH = totalH / 2;
            const drugsNatural = drugsSection.scrollHeight;
            const labsNatural = labsSection.scrollHeight;

            let drugsFlex, labsFlex;

            if (drugsNatural <= halfH && labsNatural <= halfH) {
                // Both fit in half — give each their natural size
                drugsFlex = `0 0 auto`;
                labsFlex = `0 0 auto`;
            } else if (drugsNatural <= halfH) {
                // Drugs small, labs gets the rest
                drugsFlex = `0 0 ${drugsNatural}px`;
                labsFlex = `1 1 0`;
            } else if (labsNatural <= halfH) {
                // Labs small, drugs gets the rest
                drugsFlex = `1 1 0`;
                labsFlex = `0 0 ${labsNatural}px`;
            } else {
                // Both big — split 50/50
                drugsFlex = `1 1 50%`;
                labsFlex = `1 1 50%`;
            }

            drugsSection.style.flex = drugsFlex;
            labsSection.style.flex = labsFlex;
            drugsSection.style.overflow = 'hidden';
            labsSection.style.overflow = 'hidden';
        }

        function updateTopBar() {
            const topbar = document.getElementById('topbar');
            topbar.innerHTML = `
                <span class="tag name">${currentResident.name}</span>
            `;
        }

        function updateDrugsTable() {
            const container = document.getElementById('drugsTable');
            const drugs = currentResident.drugs || [];

            if (drugs.length === 0) {
                container.innerHTML = '<div style="padding: 16px; text-align: center; color: #999;">無藥品資料</div>';
                return;
            }

            let html = '<table class="drugs-table"><thead><tr><th>醫院</th><th>科別</th><th>藥品</th><th>劑量</th><th>數量</th><th>用法</th><th>起</th><th>迄</th></tr></thead><tbody>';
            
            drugs.forEach(drug => {
                const freqClass = `freq-${drug.freq}`;
                html += `<tr>
                    <td>${drug.hospital}</td>
                    <td>${drug.dept}</td>
                    <td>${drug.drug}</td>
                    <td>${drug.dose}</td>
                    <td>${drug.qty}</td>
                    <td><span class="freq-badge ${freqClass}">${drug.freq}</span></td>
                    <td>${drug.start}</td>
                    <td>${drug.end}</td>
                </tr>`;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function updateLabsTable() {
            const container = document.getElementById('labsTable');
            const labs = currentResident.labs || [];

            if (labs.length === 0) {
                container.innerHTML = '<div style="padding: 16px; text-align: center; color: #999;">無檢驗結果</div>';
                return;
            }

            // Collect all unique dates and items
            const dateSet = new Set();
            const itemsMap = new Map();

            labs.forEach(labResult => {
                dateSet.add(labResult.date);
                (labResult.items || []).forEach(item => {
                    if (!itemsMap.has(item.name)) {
                        itemsMap.set(item.name, {});
                    }
                    itemsMap.get(item.name)[labResult.date] = item;
                });
            });

            const dates = Array.from(dateSet).sort().reverse();
            const items = Array.from(itemsMap.keys());

            // Build pivot table
            let html = '<table class="labs-table"><thead><tr><th>檢驗項目</th>';
            dates.forEach(date => {
                html += `<th>${date}</th>`;
            });
            html += '</tr></thead><tbody>';

            items.forEach(itemName => {
                const isActive = selectedLabItem === itemName;
                html += `<tr><td class="item-name ${isActive ? 'active' : ''}" onclick="selectLabItem('${itemName.replace(/'/g, "\\'")}')">${itemName}</td>`;
                dates.forEach(date => {
                    const item = itemsMap.get(itemName)[date];
                    if (item) {
                        const valueClass = item.abnormal ? 'abnormal' : '';
                        html += `<td class="${valueClass}">${item.value}</td>`;
                    } else {
                        html += '<td>-</td>';
                    }
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function selectLabItem(itemName) {
            selectedLabItem = itemName;
            updateLabsTable();
            drawChart(itemName);
        }

        function drawChart(itemName) {
            const labs = currentResident.labs || [];
            const dataPoints = [];

            labs.forEach(labResult => {
                const item = labResult.items.find(i => i.name === itemName);
                if (item) {
                    let value = parseFloat(item.value);
                    if (isNaN(value)) {
                        value = null;
                    }
                    dataPoints.push({
                        date: labResult.date,
                        value: value,
                        abnormal: item.abnormal
                    });
                }
            });

            dataPoints.sort((a, b) => a.date.localeCompare(b.date));

            const chartContainer = document.getElementById('chartContainer');
            chartContainer.classList.add('show');

            const ctx = document.getElementById('labChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }

            const borderColors = dataPoints.map(p => p.abnormal ? '#dc2626' : '#22c55e');
            const pointColors = dataPoints.map(p => p.abnormal ? '#dc2626' : '#3b82f6');

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dataPoints.map(p => p.date),
                    datasets: [{
                        label: itemName,
                        data: dataPoints.map(p => p.value),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        pointRadius: 5,
                        pointBackgroundColor: pointColors,
                        pointBorderColor: borderColors,
                        pointBorderWidth: 2,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            display: true
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false
                        }
                    }
                }
            });
        }

        document.getElementById('chartContainer').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('chartContainer').classList.remove('show');
            selectedLabItem = null;
            updateLabsTable();
            if (chartInstance) {
                chartInstance.destroy();
                chartInstance = null;
            }
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        function closeSidebarOnMobile() {
            if (window.innerWidth < 600) {
                document.getElementById('sidebar').classList.remove('open');
                document.querySelector('.sidebar-overlay').classList.remove('show');
            }
        }

        function triggerFileUpload() {
            document.getElementById('fileInput').click();
        }

        // Handle password input Enter key
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });

        // File upload handler (placeholder)
        document.getElementById('fileInput').addEventListener('change', function(e) {
            alert('檔案上傳功能待實裝');
        });
    </script>
